<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portfolio Data Lab | Grant McCurdy</title>
    <meta name="description" content="Structured analytic chat for a public-safe synthetic warehouse and systems analytics demo.">
    <link rel="stylesheet" href="assets/css/styles.css?v=20260623d">
  </head>
  <body>
    <header class="site-header compact" data-header>
      <nav class="nav-shell" aria-label="Primary navigation">
        <a class="brand" href="index.html">
          <span class="brand-mark" aria-hidden="true">GM</span>
          <span class="brand-text">Grant McCurdy</span>
        </a>
        <div class="nav-links static">
          <a href="index.html#work">Work</a>
          <a href="projects/education-data-simulation-engine.html">Data Systems</a>
          <a href="case-studies/index.html">Case Studies</a>
        </div>
      </nav>
    </header>

    <main class="detail-main data-lab-main">
      <section class="detail-hero data-lab-hero">
        <p class="section-kicker">Portfolio Data Lab</p>
        <h1>Explore a public-safe systems data lab</h1>
        <p>Structured analytic chat over a synthetic warehouse used to test analytics, validation, and reporting workflows.</p>
      </section>

      <section
        class="data-lab-shell"
        data-data-lab
        data-api-endpoint="https://portfolio-rag-api.grant-mccurdy.workers.dev/analytics/query"
        aria-labelledby="data-lab-heading"
      >
        <aside class="data-lab-prompts" aria-labelledby="data-lab-heading">
          <h2 id="data-lab-heading">Analytic prompts</h2>
          <div class="preset-row data-lab-preset-row">
            <button class="preset-button" type="button" data-question="Which courses show the strongest average observed growth?">Segment growth</button>
            <button class="preset-button" type="button" data-question="How does average observed growth change by school year?">Year trend</button>
            <button class="preset-button" type="button" data-question="What warehouse validation checks passed?">Validation checks</button>
            <button class="preset-button" type="button" data-question="Is attendance probability related to observed growth?">Attendance relationship</button>
            <button class="preset-button" type="button" data-question="How are readiness statuses distributed by course track?">Readiness mix</button>
          </div>
          <dl class="data-lab-status">
            <div>
              <dt>Warehouse</dt>
              <dd>15 tables</dd>
            </div>
            <div>
              <dt>Rows</dt>
              <dd>13,643</dd>
            </div>
            <div>
              <dt>Validation</dt>
              <dd>20 / 20</dd>
            </div>
          </dl>
        </aside>

        <section class="data-lab-chat" aria-label="Analytic chat">
          <div class="data-lab-thread" data-chat-thread aria-live="polite"></div>
          <form class="data-lab-form" data-chat-form>
            <label class="sr-only" for="data-lab-question">Question</label>
            <input id="data-lab-question" name="question" type="text" autocomplete="off" placeholder="Question about the public-safe warehouse" data-chat-input>
            <button class="button primary" type="submit">Run</button>
          </form>
        </section>
      </section>
    </main>

    <script src="assets/js/site.js"></script>
    <script src="assets/js/data-lab.js?v=20260623d"></script>
  </body>
</html>
